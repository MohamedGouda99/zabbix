---

from_cache:                 False

home_dir:                   "{{ lookup('env','HOME')  }}"
current_dir:                "{{ lookup('env','PWD')   }}"
remote_home_dir:            "{{ ansible_env[ 'HOME' ] }}"

download_cache:             "download.cache"

ci_testing:                False

# ansible-pull configuration
ansible_pull_repo: https://github.com/example/repo.git
ansible_pull_branch: main
ansible_pull_frequency: '1h'

# user management lists
users_present: []
users_absent: []
users_disabled: []

# zabbix proxy connection info
zabbix_proxy_server: localhost
zabbix_proxy_db_pass: CHANGE-ME:zabbix-password

# MariaDB version to install
mariadb_version: '11.4'

# Map distribution releases to repository releases if packages are missing
repo_release_map:
  noble: jammy

zabbix_repo_release: "{{ repo_release_map[ansible_distribution_release] | default(ansible_distribution_release) }}"
mariadb_repo_release: "{{ repo_release_map[ansible_distribution_release] | default(ansible_distribution_release) }}"

# Services to verify after installation
verify_services:
  - { name: zabbix-server, log: /var/log/zabbix/zabbix_server.log }
  - { name: zabbix-agent,  log: /var/log/zabbix/zabbix_agentd.log }
  - { name: zabbix-proxy,  log: /var/log/zabbix/zabbix_proxy.log }

# -------------------------------------------------------------

zabbix_server_username:     "Admin"
zabbix_server_password:     "zabbix"
