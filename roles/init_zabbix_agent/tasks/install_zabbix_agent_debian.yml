---
- name: Update apt cache
  apt:
    update_cache: yes

- name: Add Zabbix apt key
  apt_key:
    url: "{{ zabbix_key_url }}"
    state: present

- name: Add Zabbix repository
  apt_repository:
    repo: "{{ zabbix_apt_repo }}"
    state: present

- name: Update apt cache after adding repo
  apt:
    update_cache: yes

- name: Install Zabbix Agent
  apt:
    name: "{{ item }}"
    state: present
  with_items:
    - "{{ zabbix_agent_install }}"
