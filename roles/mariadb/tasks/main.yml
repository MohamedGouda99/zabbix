---
- name: Download MariaDB GPG key
  become: yes
  get_url:
    url: https://mariadb.org/mariadb_release_signing_key.asc
    dest: /usr/share/keyrings/mariadb.gpg
    mode: '0644'
  when: ansible_pkg_mgr == 'apt'

- name: add MariaDB repository
  become: yes
  apt_repository:
    repo: "deb [signed-by=/usr/share/keyrings/mariadb.gpg arch=amd64] https://mirror.mariadb.org/repo/{{ mariadb_version }}/ubuntu {{ mariadb_repo_release }} main"
    filename: mariadb
    state: present
  when: ansible_pkg_mgr == 'apt'

- name: update apt cache after adding MariaDB repo
  become: yes
  apt:
    update_cache: yes
  when: ansible_pkg_mgr == 'apt'

- name: install MariaDB server
  become: yes
  apt:
    name: mariadb-server
    state: present
  when: ansible_pkg_mgr == 'apt'
