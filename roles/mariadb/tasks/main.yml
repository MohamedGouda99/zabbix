---
- name: install MariaDB GPG key
  become: yes
  copy:
    src: mariadb.pgp
    dest: /tmp/mariadb.asc
    mode: '0644'
  when: ansible_pkg_mgr == 'apt'

- name: dearmor MariaDB key
  become: yes
  command: gpg --dearmor -o /usr/share/keyrings/mariadb.gpg /tmp/mariadb.asc
  args:
    creates: /usr/share/keyrings/mariadb.gpg
  when: ansible_pkg_mgr == 'apt'

- name: add MariaDB repository
  become: yes
  apt_repository:
    repo: "deb [signed-by=/usr/share/keyrings/mariadb.gpg arch=amd64] https://mirror.mariadb.org/repo/{{ mariadb_version }}/ubuntu {{ mariadb_repo_release }} main"
    filename: mariadb
    state: present
  when: ansible_pkg_mgr == 'apt'

- name: update apt cache after adding MariaDB repo
  become: yes
  apt:
    update_cache: yes
  when: ansible_pkg_mgr == 'apt'

- name: install MariaDB server
  become: yes
  apt:
    name: mariadb-server
    state: present
  when: ansible_pkg_mgr == 'apt'
