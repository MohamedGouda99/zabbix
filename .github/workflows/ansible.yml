name: Ansible CI

on:
  push:
  pull_request:

jobs:
  run-playbook:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install Ansible
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible
      - name: Execute playbook locally
        run: ansible-playbook -i hosts site.yml -e ci_testing=true
