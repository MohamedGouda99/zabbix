name: Ansible CI

on:
  push:
  pull_request:

jobs:
  run-playbook:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Start test container
        run: |
          docker run -d --name zbx-test --privileged \
            -v ${{ github.workspace }}:/ansible -w /ansible ubuntu:24.04 \
            /lib/systemd/systemd
          docker exec zbx-test apt-get update
          docker exec zbx-test apt-get install -y ansible sudo
      - name: Run playbook inside container
        run: docker exec zbx-test ansible-playbook -i hosts site.yml
      - name: Cleanup
        if: always()
        run: docker rm -f zbx-test
