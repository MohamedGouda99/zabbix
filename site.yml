---
# ----------------------------------------------------------------------
#                           Zabbix Installation
# ----------------------------------------------------------------------

- hosts: zabbix-server
  roles:
    - { role: zabbix-repository, when: not ci_testing | default(false), tags: [ server, agent ] }
    - { role: zabbix-server, when: not ci_testing | default(false), tags: server }
    - { role: zabbix-client, when: not ci_testing | default(false), tags: agent }

- hosts: zabbix-client
  roles:
    - { role: zabbix-repository, when: not ci_testing | default(false) }
    - { role: zabbix-client, when: not ci_testing | default(false) }

